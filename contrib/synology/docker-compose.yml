# Synology Container Manager (Docker) -- import as project
#
# Import via Container Manager > Project > Create > Use docker-compose.
# Network scanning (--scan) requires host networking. Without it, homelabmon
# still monitors Docker containers and syncs with peers that do scan.
#
# AUTH: The web UI is protected by a token. After first start, find the token with:
#   Container Manager > homelabmon > Terminal > run: cat /data/.homelabmon/auth-token
# To disable auth, add --no-auth to the command below.

services:
  homelabmon:
    image: ghcr.io/dx111ge/homelabmon:latest
    container_name: homelabmon
    network_mode: host
    volumes:
      - /volume1/docker/homelabmon:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Add --no-auth to disable web UI authentication
    command: ["--ui", "--scan", "--bind", ":9600"]
    restart: unless-stopped
