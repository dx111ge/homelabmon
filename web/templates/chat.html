{{define "page-content"}}
<div x-data="chatApp()" x-init="init()" class="flex flex-col h-[calc(100vh-8rem)]">
    <!-- Header -->
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold text-white"><i class="fa-solid fa-brain mr-2 text-purple-400"></i>AI Chat</h1>
            <span class="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded" x-text="model"></span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xs" :class="connected ? 'text-green-400' : 'text-red-400'">
                <i class="fa-solid fa-circle text-xs mr-1"></i>
                <span x-text="connected ? 'Ollama connected' : 'Ollama offline'"></span>
            </span>
            <button @click="clearChat()" class="text-xs text-gray-400 hover:text-white bg-gray-800 px-3 py-1 rounded">
                <i class="fa-solid fa-trash mr-1"></i>Clear
            </button>
        </div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2" x-ref="messages">
        <template x-if="messages.length === 0">
            <div class="flex flex-col items-center justify-center h-full text-gray-500">
                <i class="fa-solid fa-comments text-4xl mb-4 text-gray-700"></i>
                <p class="text-lg mb-2">Ask about your homelab</p>
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <button @click="sendSuggestion('What hosts are online?')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-2 rounded text-left">
                        <i class="fa-solid fa-server mr-1 text-blue-400"></i>What hosts are online?
                    </button>
                    <button @click="sendSuggestion('Show me all Docker containers')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-2 rounded text-left">
                        <i class="fa-brands fa-docker mr-1 text-blue-400"></i>Show me all Docker containers
                    </button>
                    <button @click="sendSuggestion('Any disk issues?')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-2 rounded text-left">
                        <i class="fa-solid fa-hard-drive mr-1 text-yellow-400"></i>Any disk issues?
                    </button>
                    <button @click="sendSuggestion('Give me a homelab summary')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-2 rounded text-left">
                        <i class="fa-solid fa-chart-pie mr-1 text-green-400"></i>Give me a homelab summary
                    </button>
                </div>
            </div>
        </template>

        <template x-for="(msg, index) in messages" :key="index">
            <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                <div :class="msg.role === 'user'
                    ? 'bg-blue-600 text-white rounded-lg rounded-br-none px-4 py-2 max-w-[80%]'
                    : 'bg-gray-800 text-gray-100 rounded-lg rounded-bl-none px-4 py-2 max-w-[80%]'">
                    <div class="text-xs text-gray-400 mb-1" x-show="msg.role !== 'user'">
                        <i class="fa-solid fa-brain mr-1 text-purple-400"></i>HomeMonitor AI
                    </div>
                    <div class="whitespace-pre-wrap text-sm" x-html="formatMessage(msg.content)"></div>
                </div>
            </div>
        </template>

        <template x-if="loading">
            <div class="flex justify-start">
                <div class="bg-gray-800 text-gray-400 rounded-lg rounded-bl-none px-4 py-3">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-spinner fa-spin text-purple-400"></i>
                        <span class="text-sm">Thinking...</span>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Input -->
    <div class="border-t border-gray-800 pt-4">
        <form @submit.prevent="sendMessage()" class="flex gap-2">
            <input
                x-model="input"
                type="text"
                placeholder="Ask about your homelab..."
                class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500"
                :disabled="loading || !connected"
                x-ref="input"
            >
            <button
                type="submit"
                class="bg-purple-600 hover:bg-purple-500 disabled:bg-gray-700 disabled:text-gray-500 text-white px-4 py-2 rounded-lg text-sm"
                :disabled="loading || !input.trim() || !connected"
            >
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </div>
</div>

<script>
function chatApp() {
    return {
        messages: [],
        input: '',
        loading: false,
        connected: false,
        model: '',
        sessionId: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),

        init() {
            this.checkConnection();
        },

        async checkConnection() {
            try {
                const resp = await fetch('/api/v1/llm/status');
                const data = await resp.json();
                this.connected = data.connected;
                this.model = data.model || '';
            } catch {
                this.connected = false;
            }
        },

        async sendMessage() {
            const text = this.input.trim();
            if (!text || this.loading) return;

            this.messages.push({ role: 'user', content: text });
            this.input = '';
            this.loading = true;
            this.scrollToBottom();

            try {
                const resp = await fetch('/api/v1/llm/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: this.sessionId })
                });
                const data = await resp.json();
                if (data.error) {
                    this.messages.push({ role: 'assistant', content: 'Error: ' + data.error });
                } else {
                    this.messages.push({ role: 'assistant', content: data.response });
                }
            } catch (err) {
                this.messages.push({ role: 'assistant', content: 'Error: Could not reach the AI service.' });
            }

            this.loading = false;
            this.scrollToBottom();
            this.$refs.input.focus();
        },

        sendSuggestion(text) {
            this.input = text;
            this.sendMessage();
        },

        clearChat() {
            this.messages = [];
            fetch('/api/v1/llm/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: this.sessionId })
            });
        },

        scrollToBottom() {
            this.$nextTick(() => {
                const el = this.$refs.messages;
                if (el) el.scrollTop = el.scrollHeight;
            });
        },

        formatMessage(text) {
            if (!text) return '';
            // Basic markdown-like formatting
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code class="bg-gray-700 px-1 rounded text-purple-300">$1</code>')
                .replace(/\n/g, '<br>');
        }
    }
}
</script>
{{end}}
